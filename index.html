<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="動向ウォッチ">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <title>企業動向ダッシュボード</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #0b1220;
      color: #e5e7eb;
      padding-bottom: env(safe-area-inset-bottom);
    }
    header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(11,18,32,0.92);
      backdrop-filter: blur(8px);
      padding: 14px 16px calc(14px);
      padding-top: calc(14px + env(safe-area-inset-top));
      border-bottom: 1px solid #1f2937;
    }
    header h1 { margin: 0; font-size: 18px; letter-spacing: .02em; }
    header .sub { margin-top: 4px; font-size: 12px; color: #9ca3af; }
    main { padding: 12px 14px 40px; max-width: 720px; margin: 0 auto; }
    .day-sep {
      margin: 18px 4px 8px; font-size: 12px; font-weight: 700;
      color: #3b82f6; letter-spacing: .05em;
    }
    .card {
      display: block; text-decoration: none; color: inherit;
      background: #111a2e; border: 1px solid #1f2937; border-radius: 14px;
      padding: 13px 15px; margin-bottom: 10px;
      transition: transform .08s ease, background .15s ease;
    }
    .card:active { transform: scale(0.985); background: #16233d; }
    .card .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .card .source {
      font-size: 11px; font-weight: 700; color: #dbeafe;
      background: #3b82f6; padding: 2px 8px; border-radius: 999px;
    }
    .card .time { font-size: 12px; color: #9ca3af; }
    .card .title { font-size: 15px; line-height: 1.5; font-weight: 600; }
    .empty { text-align: center; color: #9ca3af; padding: 60px 20px; }
    footer { text-align: center; font-size: 11px; color: #6b7280; padding: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>企業動向ダッシュボード</h1>
    <div class="sub">更新: 2026-07-04 13:12 ／ 直近24時間 ／ 0件</div>
  </header>
  <main>
<div class="empty">過去24時間以内の該当記事はありません。</div>
  </main>
  <footer>自動生成ダッシュボード</footer>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (e) {
          console.log('SW登録失敗', e);
        });
      });
    }
  </script>
</body>
</html>
